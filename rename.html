<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: transparent !important; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .modal-box { background: #1c1c1e; padding: 35px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); width: 300px; }
    h2 { font-weight: 500; margin-bottom: 20px; font-size: 20px; }
    input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 10px; padding: 12px; color: white; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #0A84FF; }
    button { background: #0A84FF; border: none; width: 100%; color: white; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <div class="modal-box">
    <h2>Rename Inbox</h2>
    <input type="text" id="new-name" maxlength="12">
    <button onclick="save()">Save Name</button>
    <div style="margin-top: 20px; font-size: 12px; color: #666; cursor: pointer;" onclick="window.close()">Cancel</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const input = document.getElementById('new-name');
    input.value = decodeURIComponent(params.get('name'));
    input.focus();

    function save() {
      window.mailAPI.updateAccountName({ id, newName: input.value });
      window.close();
    }
  </script>
</body>
</html>
