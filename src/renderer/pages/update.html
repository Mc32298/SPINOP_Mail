<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      background: transparent !important; 
      color: white; 
      font-family: -apple-system, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }
    .wrapper {
      position: relative;
      padding: 30px;
    }
    .wrapper::before {
      content: '';
      position: absolute;
      inset: 25px;
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.5);
      filter: blur(12px);
      z-index: -1;
    }
    .modal-box {
      background: #1c1c1e; 
      padding: 35px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center; 
      width: 300px;
      position: relative;
      z-index: 1;
    }
    h2 { 
      font-weight: 500; 
      margin-bottom: 10px; 
      font-size: 22px; 
    }
    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 25px;
      line-height: 1.4;
    }
    .options { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 10px; 
    }
    button { 
      background: #2c2c2e; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: white; 
      padding: 14px; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-weight: 500;
    }
    button:hover { 
      background: #3a3a3c; 
      border-color: #0A84FF; 
    }
    .btn-confirm { 
      background: #0A84FF; 
      border: none; 
      color: white; 
      font-weight: 700; 
    }
    .btn-confirm:hover {
      background: #007aff;
    }
    .cancel {
      margin-top: 20px; 
      font-size: 12px; 
      color: #666; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="modal-box">
      <h2 id="update-title">Update</h2>
      <p id="update-msg">Loading...</p>
      
      <div class="options">
        <button id="btn-primary" class="btn-confirm"></button>
        <div class="cancel" onclick="window.close()" id="btn-secondary">Wait</div>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const state = params.get('state');
    const version = params.get('version');
    
    const titleEl = document.getElementById('update-title');
    const msgEl = document.getElementById('update-msg');
    const btnPrimary = document.getElementById('btn-primary');
    const btnSecondary = document.getElementById('btn-secondary');
    
    if (state === 'available') {
      titleEl.innerText = 'Update Available';
      msgEl.innerText = `A new version of RYZE (${version}) is available. Would you like to download it now?`;
      btnPrimary.innerText = 'Download Now';
      btnPrimary.onclick = () => {
        window.mailAPI.replyUpdate('download');
        window.close();
      };
      btnSecondary.innerText = 'Wait';
    } else if (state === 'downloaded') {
      titleEl.innerText = 'Update Ready';
      msgEl.innerText = 'The update has been downloaded. Restart the application to apply the updates.';
      btnPrimary.innerText = 'Restart Now';
      btnPrimary.onclick = () => {
        window.mailAPI.replyUpdate('restart');
        window.close();
      };
      btnSecondary.innerText = 'Later';
    }
  </script>
</body>
</html>
