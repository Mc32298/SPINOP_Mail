<!DOCTYPE html>
<html>
<head>

  <!-- ======================================================================
       FONTS
       ====================================================================== -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

  <!-- ======================================================================
       STYLES
       ====================================================================== -->
  <style>

    /* ==========================================================================
       BASE
       ========================================================================== */

    body { 
      background: transparent !important; 
      color: white; 
      font-family: -apple-system, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      overflow: hidden;
    }

    /* ==========================================================================
       FAKE SHADOW WRAPPER
       ========================================================================== */

    .wrapper {
      position: relative;
      padding: 30px;
    }

    .wrapper::before {
      content: '';
      position: absolute;
      inset: 25px;
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.5);
      filter: blur(12px);
      z-index: -1;
    }

    /* ==========================================================================
       MODAL
       ========================================================================== */

    .modal-box {
      background: #1c1c1e; 
      padding: 35px; 
      border-radius: 24px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center; 
      width: 300px;
      position: relative;
      z-index: 1;
    }

    h2 { 
      font-weight: 500; 
      margin-bottom: 20px; 
      font-size: 22px; 
    }

    .cancel {
      margin-top: 20px; 
      font-size: 12px; 
      color: #666; 
      cursor: pointer;
    }

    /* ==========================================================================
       TUTORIAL TIP
       ========================================================================== */

    #tutorial-tip {
      display: none;
      background: #0A84FF;
      color: white;
      padding: 12px;
      border-radius: 14px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9) translateY(-10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* ==========================================================================
       SERVICE OPTIONS
       ========================================================================== */

    .options { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 10px; 
    }

    button { 
      background: #2c2c2e; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: white; 
      padding: 14px; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover { 
      background: #3a3a3c; 
      border-color: #0A84FF; 
    }

    /* ==========================================================================
       NAMING STEP
       ========================================================================== */

    #step-naming { 
      display: none; 
    }

    input {
      width: 100%; 
      background: #2c2c2e; 
      border: 1px solid #3a3a3c; 
      border-radius: 10px;
      padding: 12px; 
      color: white; 
      font-size: 16px; 
      margin-bottom: 20px; 
      box-sizing: border-box; 
      outline: none;
    }

    input:focus { 
      border-color: #0A84FF; 
    }

    .btn-confirm { 
      background: #0A84FF; 
      border: none; 
      width: 100%; 
      color: white; 
      font-weight: 700; 
    }

  </style>
</head>
<body>

  <!-- ======================================================================
       MODAL
       ====================================================================== -->
  <div class="wrapper">
    <div class="modal-box">

      <!-- Tutorial Tip -->
      <div id="tutorial-tip">Step 1: Pick a service below!</div>

      <!-- Step 1: Select service -->
      <div id="step-select">
        <h2>Add Service</h2>
        <div class="options">
          <button onclick="goToNaming('gmail')"><span class="material-symbols-outlined">mail</span> Gmail</button>
          <button onclick="goToNaming('outlook')"><span class="material-symbols-outlined">alternate_email</span> Outlook/Hotmail</button>
          <button onclick="goToNaming('icloud')"><span class="material-symbols-outlined">cloud</span> iCloud</button>
          <button onclick="goToNaming('notion')"><span class="material-symbols-outlined">article</span> Notion</button>
        </div>
      </div>

      <!-- Step 2: Name the inbox -->
      <div id="step-naming">
        <h2 id="naming-title">Name your Service</h2>
        <input type="text" id="acc-name" placeholder="e.g. Work, Personal..." maxlength="12">
        <button class="btn-confirm" onclick="finish()">Add to Sidebar</button>
      </div>

      <div class="cancel" onclick="window.close()">Cancel</div>

    </div>
  </div>

  <!-- ======================================================================
       SCRIPT
       ====================================================================== -->
  <script>
    // --- State ---
    let selectedType = '';

    const params = new URLSearchParams(window.location.search);
    const isTutorial = params.get('tutorial') === 'true';
    const tipElement = document.getElementById('tutorial-tip');

    // --- Init ---
    if (isTutorial) tipElement.style.display = 'block';

    // --- Step 1: Pick service ---
    function goToNaming(type) {
      selectedType = type;
      document.getElementById('step-select').style.display = 'none';
      document.getElementById('step-naming').style.display = 'block';

      if (isTutorial) {
        tipElement.innerText = "Step 2: Give it a name so you can tell your accounts apart!";
      }

      const input = document.getElementById('acc-name');
      input.value = type.charAt(0).toUpperCase() + type.slice(1);
      input.focus();
    }

    // --- Step 2: Confirm ---
    function finish() {
      const name = document.getElementById('acc-name').value || selectedType;
      window.mailAPI.addService({ type: selectedType, name: name });
      window.close();
    }
  </script>

</body>
</html>
